# Electron 版 gozd の .app パッケージング設定。Swift 版 apps/native/scripts/build-app.sh の
# 対応物。配布は GitHub Releases + mise（docs/release.md）。channel 別の上書き
# （productName / appId / extraMetadata）は buildApp.ts が CLI 引数で行う。
#
# 署名: Developer ID 署名 / notarize なし。identity が無いため electron-builder の署名
# ステップはスキップされる（ad-hoc の自動付与はされない）。未署名で成立する背景
# （linker-signed ad-hoc の残存、quarantine と Gatekeeper の関係）は docs/release.md 参照。
# mac.identity "-"（明示 ad-hoc）を使わないのは、bundle seal が生成されると buildApp.ts の
# channel marker 後書きで必ず壊れる上、hardenedRuntime 下では disable-library-validation
# entitlement まで要求されるため
#
# 前提: workspace の nodeLinker: hoisted（Electron 公式処方）。依存が npm 式の実体
# ファイルで配置されるため、electron-builder の標準の依存収集（node-pty /
# @parcel/watcher + transitive）がそのまま機能する。orca 式の自前閉包コピーは不要。
#
# レイアウト（asar: true + asarUnpack）:
#   Gozd.app/Contents/Resources/
#     app.asar                         ← files（esbuild 成果物: main / preload / cli / watcherProcess / ptyHost）+ prod node_modules
#     app.asar.unpacked/               ← asarUnpack（dist/cli.cjs + native module）
#       dist/cli.cjs                     ← ELECTRON_RUN_AS_NODE で実行するため実ファイル必須
#       node_modules/node-pty, @parcel/watcher*  ← dlopen する native
#     app/                             ← extraResources（asar の外。実ディレクトリ）
#       bin/                             ← wrapper + gozd-cli shim（gozdEnv が Resources/app/bin を期待）
#       zsh/                             ← zsh init チェーン（Swift 版と共有）
#       views/main/                      ← renderer の Vite ビルド成果物
appId: io.github.miyaoka.gozd.electron
productName: Gozd
directories:
  output: out
  buildResources: build
files:
  - dist/**
  - package.json
# asar 有効 + asarUnpack（Electron / electron-builder 公式推奨。asar: false は非推奨警告が出る）。
# gozd-cli は ELECTRON_RUN_AS_NODE 起動で asar 内が require から見えないため dist/cli.cjs だけ
# unpack する（esbuild で全依存 bundle 済みの単一ファイルなので unpack は 1 ファイルで済む。
# orca は tsc 出力 + ランタイム require のため out/cli/** 等の広い列挙が要るが gozd は不要）。
# native module（node-pty の spawn-helper / prebuild、@parcel/watcher の .node）は dlopen が
# asar 内から不可のため unpack する。electron-builder の smartUnpack が自動検出するが、
# 記載漏れ = packaged 実行時クラッシュの footgun を消すため明示する。
# 将来 stable で署名 + notarize に進む際、ASAR integrity（embeddedAsarIntegrityValidation Fuse）は
# asar 有効が前提になるため、今 asar 有効にしておくと地続きで移行できる。
asar: true
asarUnpack:
  - dist/cli.cjs
  - node_modules/node-pty/**
  - node_modules/@parcel/watcher/**
  - node_modules/@parcel/watcher-darwin-arm64/**
# node-pty prebuild は Electron でそのまま動作確認済み（dev 経路と同一バイナリ）。
# rebuild すると node-gyp コンパイルが走り prebuild の意味が消えるため無効化
npmRebuild: false
# electronDist は指定せず、electron-builder 標準の zip ダウンロード + 展開に任せる。
# unpacked dist（例: pnpm 展開済みの ../../node_modules/electron/dist）を渡すと
# コピー経路（copyDir）が空ディレクトリを作らず、Electron.app 最上位の Resources/*.lproj
# （空 dir。macOS がアプリの対応言語判定に使う）が全滅して renderer の Intl ロケールが
# en-US に固定される。標準の zip 展開経路は空 dir を保持する。zip は @electron/get 共通
# キャッシュ（~/Library/Caches/electron）から再利用され、pnpm の electron install と共有する
extraResources:
  - from: resources/bin
    to: app/bin
  - from: resources/zsh
    to: app/zsh
  - from: ../renderer/dist
    to: app/views/main
mac:
  target: dir

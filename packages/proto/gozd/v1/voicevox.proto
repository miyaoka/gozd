syntax = "proto3";

package gozd.v1;

// VOICEVOX 音声合成。Engine 起動・疎通確認・発話。

message VoicevoxLaunchRequest {}
message VoicevoxLaunchResponse {
  bool ok = 1;
}

message VoicevoxCheckEngineRequest {}
message VoicevoxCheckEngineResponse {
  bool ok = 1;
}

message VoicevoxSpeakRequest {
  string text = 1;
  double speed_scale = 2;
  double volume_scale = 3;
  uint32 speaker_id = 4;
}
message VoicevoxSpeakResponse {
  // 合成成功時の wav バイト列。失敗時は空。再生は呼び出し側（renderer）の責務。
  bytes wav = 1;
}

syntax = "proto3";

package gozd.v1;

// 複数 RPC で共有される値型をここにまとめる。
// 1 つの RPC でしか使わない型は当該 RPC の proto に置く。

message WorktreeEntry {
  string path = 1;
  string head = 2;
  string branch = 3;
  bool is_main = 4;
  // ファイル相対パス → porcelain v1 XY コード
  map<string, string> git_statuses = 5;
  repeated Task tasks = 6;
  // upstream（追跡リモートブランチ）に対する差分。upstream 未設定なら不在。
  // optional により「未設定」をフィールド不在で表現し、ahead/behind を見るには
  // upstream 自体の存在をチェックする契約を型レベルで強制する。
  optional UpstreamStatus upstream = 7;
}

// upstream（追跡リモートブランチ）との差分。`git status --porcelain=v2 --branch` の
// `# branch.ab` 行に対応。upstream 自体が未設定のときはこの message ごと不在になる。
message UpstreamStatus {
  // upstream に対して先行しているローカルコミット数（未 push）。
  uint32 ahead = 1;
  // upstream に対して遅れているリモートコミット数（未 pull）。
  uint32 behind = 2;
}

message Task {
  // UUID。Claude session とは独立した task 固有の identity。
  string id = 1;
  string body = 2;
  string worktree_dir = 3;
  // GitHub PR / issue 参照。GitHub の PR / issue は同一の番号空間を共有するため、
  // 種別 + 番号の組で 1 件を表す。task 1 件あたり最大 1 つ。
  optional GhRef gh_ref = 4;
  // ISO 8601
  string created_at = 5;
  // 最後に attach された Claude session の ID。空文字は session 未起動 / 終了済み。
  // SessionEnd では消さず保持し、サイドバークリック時の `claude --resume` 起点に使う。
  string session_id = 6;
  // サイドバーから非表示にするフラグ。ターミナル close / SessionEnd で gh_ref 持ち
  // task を削除する代わりに立てる。同 worktree_dir + 同 gh_ref で TaskAdd が来た時
  // (PR/issue picker からの再選択) や SessionStart の attach 経路で false に戻す。
  bool hidden = 7;
}

// GitHub PR / issue 参照。
message GhRef {
  GhRefKind kind = 1;
  uint32 number = 2;
}

enum GhRefKind {
  GH_REF_KIND_UNSPECIFIED = 0;
  GH_REF_KIND_PR = 1;
  GH_REF_KIND_ISSUE = 2;
}

// ディレクトリエントリ。fs/readDir / filer 用。
message FileEntry {
  string name = 1;
  // "file" / "directory" / "symlink"
  string type = 2;
}

message FileReadResult {
  string content = 1;
  bool is_binary = 2;
  bool is_directory = 3;
  bool not_found = 4;
}

message GitFileChange {
  string old_file_path = 1;
  string new_file_path = 2;
  // "A" / "M" / "D" / "R" / "U"
  string type = 3;
}

message GitCommit {
  string hash = 1;
  string short_hash = 2;
  repeated string parents = 3;
  string author = 4;
  // Unix timestamp（秒）
  int64 date = 5;
  string message = 6;
  string body = 7;
  repeated string refs = 8;
}

message GitPullRequest {
  uint32 number = 1;
  string title = 2;
  string url = 3;
  string state = 4;
  string author = 5;
  string head_ref = 6;
  string base_ref = 7;
  bool is_draft = 8;
  repeated string assignees = 9;
  repeated string reviewers = 10;
  // ISO 8601
  string updated_at = 11;
  string author_avatar_url = 12;
}

message GitIssue {
  uint32 number = 1;
  string title = 2;
  string url = 3;
  string state = 4;
  string author = 5;
  repeated string labels = 6;
  repeated string assignees = 7;
  string updated_at = 8;
  string author_avatar_url = 9;
}

message OpenTargetSelection {
  // "file" / "dir"
  string kind = 1;
  string rel_path = 2;
  // 1-based
  uint32 line_number = 3;
}

message ProjectConfig {
  // worktree 作成時にメインリポジトリからシンボリックリンクする相対パス一覧
  repeated string worktree_symlinks = 1;
}

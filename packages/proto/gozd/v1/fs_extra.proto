syntax = "proto3";

package gozd.v1;

import "gozd/v1/common.proto";

// 既存の fs.proto に対して、追加の FS RPC をここに置く。

// 絶対パスでのファイル読み取り（dir 外を許可）。プレビュー等で使用。
// path traversal の責任は呼び出し側に移譲する。
message FsReadFileAbsoluteRequest {
  string absolute_path = 1;
}
message FsReadFileAbsoluteResponse {
  FileReadResult result = 1;
}

// fsWriteFile: dir 配下に書き込む。path traversal guard は server 側。
message FsWriteFileRequest {
  string dir = 1;
  string path = 2;
  bytes data = 3;
}
message FsWriteFileResponse {}

// fsStat: ファイル / ディレクトリの存在確認 + 種別取得
message FsStatRequest {
  string dir = 1;
  string path = 2;
}
message FsStatResponse {
  bool exists = 1;
  // "file" / "directory" / "symlink"
  string type = 2;
  uint64 size = 3;
  // ISO 8601
  string modified_at = 4;
}

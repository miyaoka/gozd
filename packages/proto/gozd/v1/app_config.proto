syntax = "proto3";

package gozd.v1;

// ユーザー設定。`~/.config/gozd/config.json` に永続化される。
//
// 設計判断:
//
// 1. **proto SSOT で型付き定義**。旧実装は `Record<string, unknown>` + dot-key
//    だったが、新実装ではセクションをネスト messages にして型を持たせる。
//    新しい設定を追加するときは proto に field を追加する（buf generate 必須）。
//
// 2. **永続化形式は proto JSON mapping**。AppState と同じ流儀で、
//    生成型の toJSON でファイルへ書き出す（stores.ts）。
message AppConfig {
  TerminalConfig terminal = 1;
  PreviewConfig preview = 2;
  VoicevoxConfig voicevox = 3;
  ArcadeConfig arcade = 4;
}

message TerminalConfig {
  // 空文字列はデフォルトテーマ（renderer 側 fallback）
  string theme = 1;
  // 空文字列なら xterm デフォルト
  string font_family = 2;
  // 0 なら xterm デフォルト
  uint32 font_size = 3;
}

message PreviewConfig {
  // 散文 (markdown 本文等) 用。空文字列なら app デフォルト (sans)
  string font_family = 1;
  uint32 font_size = 2;
  // コード (code preview / diff / markdown コードブロック) 用。
  // 空文字列なら monospace スタック (--font-mono) に fallback
  string code_font_family = 3;
}

message VoicevoxConfig {
  bool enabled = 1;
  double speed_scale = 2;
  double volume_scale = 3;
  // 未設定なら renderer 側 default にフォールバック。
  // VOICEVOX の正規 style ID 0 (四国めたん あまあま) と未設定を区別するため optional で wrap する。
  optional uint32 speaker_id = 4;
}

message ArcadeConfig {
  // ゲームジュース層の効果音 ON/OFF。未設定 (初インストール) と明示 false (ユーザーが
  // ミュート) を区別するため optional で wrap する。未設定なら renderer 側 default (ON) に倒す。
  optional bool sfx_enabled = 1;
}

message LoadAppConfigRequest {}

message LoadAppConfigResponse {
  AppConfig config = 1;
}

message SaveAppConfigRequest {
  AppConfig config = 1;
}

message SaveAppConfigResponse {}

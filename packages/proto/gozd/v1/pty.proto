syntax = "proto3";

package gozd.v1;

// PTY 子プロセスを spawn して PTY master fd を確立する。
// 戻り値 pty_id は同一 SocketServer / WebView セッション内で有効な不透明 ID。
message PtySpawnRequest {
  string dir = 1;
  string executable = 2;
  repeated string args = 3;
  map<string, string> env = 4;
  uint32 rows = 5;
  uint32 cols = 6;
  // この PTY が属する worktree の絶対パス。Claude セッション復元の紐付けに使う。
  // 空文字なら無紐付け。
  string worktree_path = 7;
}

message PtySpawnResponse {
  uint32 pty_id = 1;
}

// PTY master fd への書き込み（renderer → 子プロセスのキー入力等）。
message PtyWriteRequest {
  uint32 pty_id = 1;
  bytes data = 2;
}

message PtyWriteResponse {}

// terminal サイズの変更を子プロセスに通知（xterm.js のリサイズ連動）。
message PtyResizeRequest {
  uint32 pty_id = 1;
  uint32 rows = 2;
  uint32 cols = 3;
}

message PtyResizeResponse {}

// 子プロセスに SIGHUP を送る。
message PtyKillRequest {
  uint32 pty_id = 1;
}

message PtyKillResponse {}

// renderer 側に push される PTY イベント（main → renderer、`rpc:push` で配送）。
message PtyDataEvent {
  uint32 pty_id = 1;
  bytes data = 2;
}

message PtyExitEvent {
  uint32 pty_id = 1;
  // "exited" / "signaled" / "stopped"
  string reason = 2;
  // exited 時の exit code、signaled 時の signal 番号、stopped 時は 0
  int32 code = 3;
  // signaled 時のみ意味を持つ
  bool core_dumped = 4;
}

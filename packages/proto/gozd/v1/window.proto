syntax = "proto3";

package gozd.v1;

// gozd ウィンドウ操作 RPC。

// ウィンドウを閉じる（シングルウィンドウ運用ではアプリ終了相当）。
message WindowCloseRequest {}
message WindowCloseResponse {}

// titlebar の ToolbarItem に出すコンテキスト（active repo / worktree）。
// renderer 側で active worktree が変わるたびに push し、native の toolbar が反映する。
message WindowSetTitleContextRequest {
  string repo_name = 1;
  string worktree_name = 2;
}
message WindowSetTitleContextResponse {}

// サーバー一覧パネルの開閉状態を native titlebar のトグルボタンにミラーする。
// パネルの開閉状態は renderer が SSOT として所有し、変化のたびに push して
// native の ToolbarItem の active 表示 (塗り) を同期する。TitleContext と同流儀。
message WindowSetServerPanelOpenRequest {
  bool open = 1;
}
message WindowSetServerPanelOpenResponse {}

syntax = "proto3";

package gozd.v1;

import "gozd/v1/common.proto";

// プロジェクト固有の Task 永続化 (`~/.config/gozd/projects/<projectKey>/tasks.json`)。
//
// task = Claude session の同一視ルール (issue #504): Task は session-start hook で
// auto upsert、session-end hook で auto remove される。renderer から書く API は
// OSC ターミナルタイトル → body 同期の rpcTaskUpdate のみ。
//
// projectKey は dir の realpath から server 側で算出する。renderer は dir のみ渡す。

// TaskStore の永続化形式（tasks.json）。
message TaskList {
  repeated Task tasks = 1;
}

message TaskUpdateRequest {
  string dir = 1;
  string id = 2;
  string body = 3;
}
message TaskUpdateResponse {
  Task task = 1;
}

# コードバリデーションワークフロー
name: code_validation
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==============================================================
  # コードバリデーション（Matrix実行）
  #
  # PRで差分のあるパッケージとその依存先に限定してチェックする
  # ルート設定ファイル（pnpm-workspace.yaml, mise.toml）が変更された場合は
  # 全ワークスペースを対象にチェックする
  # ==============================================================
  validation:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # diff_command の --include-workspace-root: pnpm の --filter はルート
          # ワークスペースプロジェクトをデフォルトで選ばないため、これが無いと
          # ルート直下ファイル（knip.ts 等）の lint / fix が差分 PR で一切走らない
          - name: typecheck
            diff_command: pnpm --filter '...[origin/${{ github.base_ref }}]' --include-workspace-root --if-present --no-bail --aggregate-output --reporter=append-only typecheck
            full_command: pnpm run typecheck:all

          - name: lint
            diff_command: pnpm --filter '...[origin/${{ github.base_ref }}]' --include-workspace-root --if-present --no-bail --aggregate-output --reporter=append-only lint
            full_command: pnpm run lint:all

          # fix（oxlint --fix / eslint --fix + oxfmt）を実行し、working tree に
          # 差分が出たら fail する。フォーマット崩れ・自動修正可能な lint 違反が
          # commit されていないことを保証する
          - name: fix
            diff_command: pnpm --filter '...[origin/${{ github.base_ref }}]' --include-workspace-root --if-present --no-bail --aggregate-output --reporter=append-only fix && git diff --exit-code
            full_command: pnpm run fix:all && git diff --exit-code

          # @gozd/native は SwiftUI / WebKit / FSEvents 等 macOS 専用 API に依存し
          # Linux runner では `swift test` が走らない。別 job（swift-test）で実行する。
          - name: test
            diff_command: pnpm --filter '...[origin/${{ github.base_ref }}]' --filter '!@gozd/native' --if-present --no-bail --aggregate-output --reporter=append-only test
            full_command: pnpm --filter '!@gozd/native' -r --if-present --no-bail --aggregate-output --reporter=append-only test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          filter: blob:none
          fetch-depth: 0
          show-progress: false

      - uses: ./.github/actions/setup-environment

      # ルート設定ファイルの変更を検出
      # pnpm-workspace.yaml: catalog でバージョン管理、各 package.json は catalog: 参照のため差分が出ない
      # mise.toml: Node.js/pnpm/Bun バージョン
      - uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        id: root-config
        with:
          files: |
            pnpm-workspace.yaml
            mise.toml

      # ルート設定ファイルが変更された場合は全体チェック、それ以外は差分フィルタ
      - name: Run ${{ matrix.name }}
        run: |
          if [[ "${{ steps.root-config.outputs.any_changed }}" == "true" ]]; then
            echo "ルート設定ファイルが変更されたため、全ワークスペースをチェックします"
            ${{ matrix.full_command }}
          else
            ${{ matrix.diff_command }}
          fi

  # ==============================================================
  # Swift 差分検出
  #
  # Swift パッケージ（apps/native, packages/proto-swift）または
  # swift-test job 自体の定義に変更があるときだけ macOS runner を起動する。
  # apps/native は packages/proto-swift を local path 依存しているため両方を監視する。
  # Linux runner で軽量に判定する。
  # ==============================================================
  detect-swift-changes:
    name: detect-swift-changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.changed.outputs.any_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          filter: blob:none
          fetch-depth: 0
          show-progress: false

      - uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        id: changed
        with:
          files: |
            apps/native/**
            packages/proto-swift/**
            .github/workflows/code_validation.yml

  # ==============================================================
  # Swift テスト（macOS 専用）
  #
  # @gozd/native は SwiftUI / WebKit / FSEvents 等 macOS 専用 API に依存するため
  # Linux runner では build できない。macos-26 runner で `swift test` を実行する。
  # detect-swift-changes が監視する path（apps/native, packages/proto-swift,
  # workflow 自身）に差分があるときのみ実行する。
  # ==============================================================
  swift-test:
    name: swift-test
    needs: detect-swift-changes
    if: needs.detect-swift-changes.outputs.changed == 'true'
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          filter: blob:none
          show-progress: false

      # GozdProto モジュールの `*.pb.swift` は git に commit せず `packages/proto`
      # の prepare で生成する（docs/architecture.md「型共有: `.proto` SSOT」参照）。
      # `pnpm install --frozen-lockfile` 経由で workspace の prepare が走り、
      # `Sources/GozdProto/*.pb.swift` が揃った状態で `swift test` を実行できる。
      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: swift test
        working-directory: apps/native
        # GOZD_PTY_TRACE: PTY ライフサイクル / テスト境界 trace を CI ログに残す
        # ための観測 hook。issue #450 (PTYRegistryTests.spawnAndExitDispatch) と
        # issue #556 (PTYManagerTests.resizeIsSafe) で再発した flake の root cause
        # を一意特定するために維持する。DEBUG build かつこの env=1 のときのみ、
        # PTYManager 内のライフサイクルイベント（drainPTY 集約結果、source
        # eventHandler 発火順、waitpid 戻り値・errno、PTYFinishState 状態遷移、
        # resize/kill/write の syscall 結果）と、テスト境界（test entry/exit、
        # waitUntil tick 履歴、runner 環境 snapshot）を stderr に時系列出力する。
        env:
          GOZD_PTY_TRACE: "1"
        run: swift test

  # ==============================================================
  # CI全体のステータス集約
  # Branch Protectionルールでこのジョブのみを必須チェックに設定
  # これにより内部のジョブ構成を自由に変更可能
  # ==============================================================
  all-green:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validation
      - detect-swift-changes
      - swift-test
    steps:
      - name: Check all CI jobs status
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: validation,swift-test

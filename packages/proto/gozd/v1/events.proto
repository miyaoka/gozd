syntax = "proto3";

package gozd.v1;

import "gozd/v1/common.proto";

// Swift → renderer の push event。`window.__gozdReceive(type, payload)` 経由で配送。
//
// payload は proto3 JSON mapping でシリアライズされ、renderer 側は `onMessage(type, fn)` で購読する。
// 既存の PtyDataEvent / PtyExitEvent / HookMessage / OpenMessage と同じ流儀。

// fsChange: 任意ディレクトリ配下のファイル変更
message FsChangeEvent {
  // 監視 root に対する相対ディレクトリ
  string rel_dir = 1;
}

// gitStatusChange: アクティブ worktree の git status 変化
message GitStatusChangeEvent {
  string dir = 1;
  map<string, string> statuses = 2;
  string head = 3;
  bool has_upstream = 4;
  uint32 ahead = 5;
  uint32 behind = 6;
}

// branchChange: ブランチ ref の変更（作成・削除・リネーム）
message BranchChangeEvent {
  string dir = 1;
}

// worktreeChange: 非アクティブ worktree の変更
message WorktreeChangeEvent {
  string dir = 1;
}

// gozdOpen: CLI から `gozd open <path>` 等が来た時に renderer へ通知
message GozdOpenEvent {
  string dir = 1;
  OpenTargetSelection selection = 2;
  string channel = 3;
  string repo_name = 4;
  bool is_git_repo = 5;
  // 既存ウィンドウ再利用時に切り替え先を指定
  string switch_to_dir = 6;
}

// notify: desktop / cli からの通知
message NotifyEvent {
  // "error" / "info"
  string type = 1;
  string source = 2;
  string message = 3;
  string detail = 4;
}

syntax = "proto3";

package gozd.v1;

import "gozd/v1/common.proto";

// プロジェクト固有の Task 永続化 (`~/.config/gozd/projects/<projectKey>/tasks.json`)。
//
// task ≠ Claude session。task は PR / issue / 手動作成で生まれ、worktree の寿命に
// 揃った永続オブジェクト。Claude session は task に attach する短命属性として
// task.session_id に格納する。SessionStart で attach、SessionEnd では切り離さず保持し
// 次回 `claude --resume` の起点に使う。
//
// projectKey は dir の realpath から server 側で算出する。renderer は dir のみ渡す。

// TaskStore の永続化形式（tasks.json）。
message TaskList {
  repeated Task tasks = 1;
}

message TaskAddRequest {
  string dir = 1;
  // ユーザー明示の確定タイトル。PR/issue picker 経路では通常空、手動作成時のみ使う。
  string user_title = 2;
  string worktree_dir = 3;
  // GitHub PR / issue 参照。手動作成時は未指定で OK。
  optional GhRef gh_ref = 4;
  // PR/issue picker からの snapshot タイトル。upsert 経路 (同 worktree + 同 ghRef) で
  // 既存 task が見つかれば gh_title を上書き、user_title は触らない。
  string gh_title = 5;
}
message TaskAddResponse {
  Task task = 1;
}

// OSC ターミナルタイトルの観測値を Task に書き込む経路。renderer の useSidebarData が
// terminal title 変化を観測して呼ぶ。user_title が空のときの表示フォールバックに使う。
message TaskSetTerminalTitleRequest {
  string dir = 1;
  string id = 2;
  string terminal_title = 3;
}
message TaskSetTerminalTitleResponse {
  Task task = 1;
}

// 編集 dialog からのユーザー明示タイトル設定。空文字は user_title をクリアし、
// 表示は terminal_title フォールバックに戻る (= reset)。dialog UI が
// preview ボタンで PR/issue title や terminal_title を input にコピーして
// 保存させるため、空文字保存は意図ある reset 操作として受理する。
message TaskSetUserTitleRequest {
  string dir = 1;
  string id = 2;
  string user_title = 3;
}
message TaskSetUserTitleResponse {
  Task task = 1;
}

// ⋮ メニューからの明示削除。worktree 削除 cascade とは別経路。
// root worktree のように `git worktree remove` できない場所で生まれた task や、
// closed_by_user で滞留した task を片付けるためのユーザー操作。
message TaskRemoveRequest {
  string dir = 1;
  string id = 2;
}
message TaskRemoveResponse {}

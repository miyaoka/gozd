syntax = "proto3";

package gozd.v1;

// 複数 RPC で共有される値型をここにまとめる。
// 1 つの RPC でしか使わない型は当該 RPC の proto に置く。

message WorktreeEntry {
  string path = 1;
  string head = 2;
  string branch = 3;
  bool is_main = 4;
  // ファイル相対パス → porcelain v1 XY コード
  map<string, string> git_statuses = 5;
  // rename / copy エントリの 新パス → 旧パス。`git_statuses` のキーは新パスのみ持つため、
  // 旧パス (HEAD 側の比較元) はこの map で運ぶ。rename が無ければ空。
  map<string, string> rename_old_paths = 9;
  repeated Task tasks = 6;
  // upstream（追跡リモートブランチ）に対する差分。upstream 未設定なら不在。
  // optional により「未設定」をフィールド不在で表現し、ahead/behind を見るには
  // upstream 自体の存在をチェックする契約を型レベルで強制する。
  optional UpstreamStatus upstream = 7;
  // 変更ファイルの最終更新時刻 (Unix 秒)。`git_statuses` の各パスを stat した最大値。
  // clean (差分なし) / stat 全失敗のときは 0。削除済みパスは stat 失敗で自動除外される。
  // `git_statuses` / `upstream` と同じ 1 セットとして書き込まれる契約 (SSOT)。
  int64 latest_mtime = 8;
}

// upstream（追跡リモートブランチ）との差分。`git status --porcelain=v2 --branch` の
// `# branch.ab` 行に対応。upstream 自体が未設定のときはこの message ごと不在になる。
message UpstreamStatus {
  // upstream に対して先行しているローカルコミット数（未 push）。
  uint32 ahead = 1;
  // upstream に対して遅れているリモートコミット数（未 pull）。
  uint32 behind = 2;
}

message Task {
  // UUID。Claude session とは独立した task 固有の identity。
  string id = 1;
  string worktree_dir = 3;
  // GitHub PR / issue 参照。GitHub の PR / issue は同一の番号空間を共有するため、
  // 種別 + 番号の組で 1 件を表す。task 1 件あたり最大 1 つ。
  optional GhRef gh_ref = 4;
  // ISO 8601
  string created_at = 5;
  // 最後に attach された Claude session の ID。空文字は session 未起動 / 終了済み。
  // SessionEnd では消さず保持し、サイドバークリック時の `claude --resume` 起点に使う。
  string session_id = 6;
  // ユーザーが明示的にターミナルを close した task かどうか。
  // SessionEnd / terminal close (detachSession) で true に倒し、resume クリック /
  // PR picker 再選択 / 同 sid SessionStart hook (attachSession) で false に戻す。
  // app close (renderer 強制終了) では detachSession 経路を通らないため据え置き。
  // サイドバー UI の "closed" / "resumable" 状態区別に使う。
  bool closed_by_user = 7;
  // ユーザーが UI で明示的に編集 / rename した確定値。最優先で表示に使う。
  // 空文字は「ユーザー指定なし」(= gh_title / terminal_title へフォールバック) を意味する。
  string user_title = 8;
  // OSC ターミナルタイトル経由で観測した live 値。user_title / gh_title が空のときの
  // 最終フォールバック。Claude が transcript 起動直後に送る placeholder ("Claude Code")
  // は表示側で除外する。
  string terminal_title = 9;
  // PR/issue picker 取得時の snapshot タイトル。user_title が空のときの第 2 優先表示で、
  // OSC タイトル更新では触らない (gh ↔ terminal の独立性が SSOT)。
  // 今後 Refresh 経路で gh から再取得して上書きすることもありうる。
  string gh_title = 10;
}

// GitHub PR / issue 参照。
message GhRef {
  GhRefKind kind = 1;
  uint32 number = 2;
}

enum GhRefKind {
  GH_REF_KIND_UNSPECIFIED = 0;
  GH_REF_KIND_PR = 1;
  GH_REF_KIND_ISSUE = 2;
}

// ディレクトリエントリ。fs/readDir / filer 用。
message FileEntry {
  string name = 1;
  // "file" / "directory" / "symlink"
  string type = 2;
}

message FileReadResult {
  string content = 1;
  bool is_binary = 2;
  bool is_directory = 3;
  bool not_found = 4;
}

message GitFileChange {
  string old_file_path = 1;
  string new_file_path = 2;
  // "A" / "M" / "D" / "R" / "U"
  string type = 3;
}

message GitCommit {
  string hash = 1;
  string short_hash = 2;
  repeated string parents = 3;
  string author = 4;
  // Unix timestamp（秒）
  int64 date = 5;
  string message = 6;
  string body = 7;
  repeated string refs = 8;
}

message GitPullRequest {
  uint32 number = 1;
  string title = 2;
  string url = 3;
  string state = 4;
  string author = 5;
  string head_ref = 6;
  string base_ref = 7;
  bool is_draft = 8;
  repeated string assignees = 9;
  repeated string reviewers = 10;
  // ISO 8601
  string updated_at = 11;
  string author_avatar_url = 12;
  // base branch の commit OID (immutable identifier)。base ref 名と異なり、
  // fork PR / base force-push / base rename にまたがって安定して base 端を識別できる。
  // PR diff 表示モードで「base..working tree」の base 端に使う SSOT。
  string base_ref_oid = 13;
}

message GitIssue {
  uint32 number = 1;
  string title = 2;
  string url = 3;
  string state = 4;
  string author = 5;
  repeated string labels = 6;
  repeated string assignees = 7;
  string updated_at = 8;
  string author_avatar_url = 9;
}

message OpenTargetSelection {
  // "file" / "dir"
  string kind = 1;
  string rel_path = 2;
  // 1-based
  uint32 line_number = 3;
}

message ProjectConfig {
  // worktree 作成時にメインリポジトリからシンボリックリンクする相対パス一覧
  repeated string worktree_symlinks = 1;
}

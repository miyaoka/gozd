packages:
  - apps/*
  - packages/*

# Electron 公式処方 (Building your First App): パッケージングツールチェーンは
# npm 式に物理配置された node_modules を前提とするため、pnpm では hoisted linker が
# 必須。symlink の virtual store (.pnpm) だと electron-builder の依存収集が
# packaged 側に実体を運べない（参考実装 codiff も同設定）
nodeLinker: hoisted

allowBuilds:
  # postinstall は prebuilt 不在時の node-gyp fallback。platform 別 prebuilt
  # (@parcel/watcher-darwin-arm64 等) が optionalDependencies で入るため実行不要
  '@parcel/watcher': false
  '@tailwindcss/oxide': true
  electron: true
  # electron-builder の Windows 用 transitive dep。macOS 専用の gozd では script 不要
  electron-winstaller: false
  esbuild: true
  lefthook: true
  node-pty: true
  unrs-resolver: true

catalog:
  '@tailwindcss/vite': 4.3.3
  '@types/bun': 1.3.14
  '@types/node': 24.13.3
  '@typescript-eslint/parser': 8.65.0
  # TS7 (native) は programmatic API を持たない（7.1 で新 API 予定）ため、compiler API を
  # 埋め込む tooling（vue-tsc / typescript-eslint）は TS6 に据え置く。TS 7.0 公式処方の
  # dual alias: `tsc` バイナリは @typescript/native、`typescript` の import 名は TS6 API を
  # 再エクスポートする互換 package へ向ける（同名 2 バージョン同居による解決の揺れを避ける）
  '@typescript/native': npm:typescript@7.0.2
  eslint: 10.7.0
  eslint-plugin-import-x: 4.17.1
  eslint-plugin-unused-imports: 4.4.1
  lefthook: 2.1.10
  oxfmt: 0.59.0
  oxlint: 1.74.0
  oxlint-tsgolint: 7.0.2001
  tailwindcss: 4.3.3
  typescript: npm:@typescript/typescript6@6.0.2
  vite: 8.1.5

minimumReleaseAge: 4320

# TS7 の dual alias（catalog 参照）で vue-tsc が動くのは、`typescript` が
# @typescript/typescript6 へ alias された場合に実体の tsc を辿り直す対応が入った 3.3.8 から。
# 公開直後で minimumReleaseAge を満たさないため、この version に限って除外する
# （version 指定なので renovate が上げた次の version には効かず、除外は自然に切れる）
minimumReleaseAgeExclude:
  - vue-tsc@3.3.8
  - '@vue/language-core@3.3.8'

shellEmulator: true

patchedDependencies:
  # バージョン限定: patch は 0.55.1 の配布物の行位置に依存する。name-only key だと
  # 将来バージョンにも適用され、失敗理由が patch 側の腐敗として現れて分かりにくい
  "monaco-editor@0.55.1": patches/monaco-editor.patch

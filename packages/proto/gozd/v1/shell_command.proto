syntax = "proto3";

package gozd.v1;

// `gozd` shell コマンドのインストール / アンインストール。
// `~/.local/bin/gozd` に .app 内 wrapper への symlink を作る / 消す。

message ShellCommandInstallRequest {}
message ShellCommandInstallResponse {
  // symlink 配置先（`~/.local/bin/gozd`）
  string source = 1;
  // symlink が指す先（.app 内 wrapper の絶対パス）
  string target = 2;
  // 既に同じ target を指す symlink が存在し、何もしなかった
  bool already_installed = 3;
  // 別の target を指していた symlink を上書きした
  bool replaced = 4;
}

message ShellCommandUninstallRequest {}
message ShellCommandUninstallResponse {
  string source = 1;
  // 削除した（存在し、かつこの .app の wrapper を指していた）
  bool removed = 2;
  // 既に存在しなかった
  bool not_installed = 3;
}

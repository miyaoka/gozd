syntax = "proto3";

package gozd.v1;

import "gozd/v1/common.proto";

// プロジェクト固有設定 (`~/.config/gozd/projects/<projectKey>/config.json`)。
// projectKey は dir の realpath から server 側で算出する。

message ProjectConfigLoadRequest {
  string dir = 1;
}
message ProjectConfigLoadResponse {
  ProjectConfig config = 1;
}

message ProjectConfigSaveRequest {
  string dir = 1;
  ProjectConfig config = 2;
}
message ProjectConfigSaveResponse {}

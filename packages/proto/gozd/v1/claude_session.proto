syntax = "proto3";

package gozd.v1;

// Claude Code セッション関連の RPC 型。
//
// セッションの永続化自体は task.proto の Task.session_id が SSOT (worktree 単位の
// resume 復元は ResumableSessionList で task.json から引く)。このファイルには PTY 単位の
// session 掃除 (RemoveByPty) と セッションログ表示 (ClaudeSessionLog) の RPC 型のみ置く。

// 指定 PTY に紐づく Claude セッションを永続化から削除する。renderer の
// unregisterPane（terminal.closePane / resetLayout / worktree 削除）から呼ぶ。
// session-end hook 経路ではなく PTY 単位の明示的削除なので、worktree_path も
// 併せて受け取って projectKey 解決を確定させる。pty_id に紐づく sessionId は
// native 側の PTYRegistry が保持する。
message ClaudeSessionRemoveByPtyRequest {
  uint32 pty_id = 1;
  string worktree_path = 2;
}

message ClaudeSessionRemoveByPtyResponse {
  // 削除した session_id。renderer が repoStore の WorktreeEntry.tasks から
  // 該当 Task を即時削除するために使う。pty に session が紐付いていなかった
  // 場合は空文字。
  string removed_session_id = 1;
}

// Claude Code が ~/.claude/projects/<cwd エンコード>/<session_id>.jsonl に書き出した
// セッションログ (JSONL) を読む。サイドバー task メニューの「セッションログ表示」と
// ターミナル右上の preview overlay (TerminalSessionPreview) の両方で使う。
//
// **解決方式**: worktree_path (PTY 起動時の cwd) を SSOT とし、Claude の dir encoding
// 規則 (`/` `.` → `-`) で `~/.claude/projects/<encoded>/` を決定的に組み立てる。
// 過去版は session_id だけを受け取り全 projectDir を glob で walk する設計だったが、
// (1) JSONL は SessionStart 時点で未生成なので glob が空ヒットする race、
// (2) projects 親や全 projectDir を読むと cross-session ノイズが入る、の 2 つを構造的に
// 解消するため worktree_path 必須に切り替えた。
//
// **trade-off**: PTY 起動後に Claude を `cd` で別 cwd に移し fork したセッションは追えない
// (worktree_path が固定のため)。gozd の運用では PTY は 1 worktree に紐づき cd しない前提
// なので影響しない。
//
// **encoding 規則の安定性**: Claude 側の内部仕様で将来変わる可能性はあるが、変わったら
// preview / dialog が空表示として顕在化する。これは silent fallback で隠すよりも検出
// 可能性が高い (`learned(yagni)` 規律と整合)。
message ClaudeSessionLogRequest {
  string session_id = 1;
  // PTY が起動された worktree dir。`~/.claude/projects/<encoded>/` の SSOT となる cwd。
  // 空文字は contract violation (renderer 側で error 化される)。
  string worktree_path = 2;
}

// セッションログ 1 本分 (main または subagent)。parse は renderer 側が担う。
message ClaudeSessionLogEntry {
  // "main" (本体セッション) または "subagent" (Task / Workflow ツールで起動したサブエージェント)。
  // workflow agent かどうかは workflow_run_id の有無で判別する。
  string kind = 1;
  // main は session_id、subagent は agent_id。
  string id = 2;
  // subagent のラベル (meta.json の description)。main は空文字。
  string label = 3;
  // subagent の agentType (meta.json)。main は空文字。
  string agent_type = 4;
  // jsonl の絶対パス。
  string path = 5;
  // jsonl の生内容 (改行区切り)。
  string content = 6;
  // この subagent を spawn した main 側 Agent tool_use の id (meta.json の toolUseId)。
  // main の Agent tool_use と subagent を結ぶキー。main entry は空文字。
  // SendMessage による resume は別キー (main tool_use の input.to == この entry の id or name)
  // で結ぶため、この field には現れない (resume では新規 subagent が作られないため)。
  string parent_tool_use_id = 7;
  // subagent の名前 (meta.json の name)。SendMessage の input.to は agent_id だけでなく
  // agent name のこともあるため、id と name の双方で resume を紐付けられるよう露出する。
  // 名前付きで起動していない subagent / main は空文字。
  string name = 8;
  // この subagent が属する workflow run の id (wf_xxx)。Workflow ツールが spawn した
  // workflow agent のみ非空。Task ツール subagent / main は空文字。main の Workflow
  // tool_use と結ぶグループキー (main の Workflow tool_result の "Run ID: wf_xxx" と一致)。
  string workflow_run_id = 9;
  // workflow の表示名 (<sessionId>/workflows/<wf_id>.json の workflowName)。
  // タブバーのグループ見出しに使う。非 workflow subagent / main は空文字。
  string workflow_name = 10;
  // workflow agent の phase 名 (workflowProgress の phaseTitle)。タブのラベルに使う。
  // 非 workflow subagent / main は空文字。
  string phase_title = 11;
}

message ClaudeSessionLogResponse {
  // main の jsonl が glob で見つかったか。未起動 / cleanup 済みセッションでは false。
  bool found = 1;
  // entries[0] が main、残りが subagents (見つかった順)。found=false なら空。
  // Task ツール subagent は ~/.claude/projects/<encoded>/<session_id>/subagents/agent-*.jsonl、
  // Workflow agent は同 subagents/workflows/<wf_id>/agent-*.jsonl に isSidechain ログとして
  // 並ぶ。main の projectDir を起点に両方を列挙する。
  repeated ClaudeSessionLogEntry entries = 2;
  // ライブ更新で renderer 側が fsWatch を張る specific projectDir
  // (~/.claude/projects/<encoded>/)。!found 時も同じ specific dir で、未生成なら native 側
  // で idempotent に mkdir した上で返す。projects 親への fallback は持たない (親には
  // 他セッションの jsonl も同居するため、fsChange の cross-session ノイズが構造的に発生
  // し refresh が走り続けるため)。
  string watch_dir = 3;
}

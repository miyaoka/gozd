packages:
  - apps/*
  - packages/*

# Electron 公式処方 (Building your First App): パッケージングツールチェーンは
# npm 式に物理配置された node_modules を前提とするため、pnpm では hoisted linker が
# 必須。symlink の virtual store (.pnpm) だと electron-builder の依存収集が
# packaged 側に実体を運べない（参考実装 codiff も同設定）
nodeLinker: hoisted

allowBuilds:
  # postinstall は prebuilt 不在時の node-gyp fallback。platform 別 prebuilt
  # (@parcel/watcher-darwin-arm64 等) が optionalDependencies で入るため実行不要
  '@parcel/watcher': false
  '@tailwindcss/oxide': true
  electron: true
  # electron-builder の Windows 用 transitive dep。macOS 専用の gozd では script 不要
  electron-winstaller: false
  esbuild: true
  lefthook: true
  node-pty: true
  unrs-resolver: true

catalog:
  '@tailwindcss/vite': 4.3.2
  '@types/bun': 1.3.14
  '@types/node': 24.13.2
  '@typescript-eslint/parser': 8.62.1
  '@typescript/native-preview': 7.0.0-dev.20260704.1
  eslint: 10.6.0
  eslint-plugin-import-x: 4.17.1
  eslint-plugin-unused-imports: 4.4.1
  lefthook: 2.1.9
  oxfmt: 0.57.0
  oxlint: 1.72.0
  oxlint-tsgolint: 0.24.0
  tailwindcss: 4.3.2
  typescript: 6.0.3
  vite: 8.1.3

minimumReleaseAge: 4320

shellEmulator: true

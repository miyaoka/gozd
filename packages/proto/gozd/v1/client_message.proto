syntax = "proto3";

package gozd.v1;

// CLI / nc から SocketServer へ送られるメッセージ。
// NDJSON 1 行 = 1 ClientMessage（proto3 JSON mapping）。
//
// proto3 oneof は JSON で `{"hook":{...}}` / `{"open":{...}}` の形式になり、
// nc 直送コマンドにそのまま埋め込める：
//
//   echo '{"hook":{"event":"session-start","ptyId":'"$GOZD_PTY_ID"'}}' | nc -w 1 -U "$GOZD_SOCKET_PATH"
message ClientMessage {
  oneof body {
    HookMessage hook = 1;
    OpenMessage open = 2;
  }
}

// Claude Code の hook イベント通知。
// 軽量な nc 直送経路では event / pty_id のみ。CLI 経由の rich 経路では
// 残りの payload フィールドが埋まる。
message HookMessage {
  // "session-start" / "session-end" / "running" / "done" / "needs-input" /
  // "tool-done" / "tool-failure" / "stop-failure"
  string event = 1;
  uint32 pty_id = 2;

  // CLI 経由のみ
  string last_assistant_message = 3;
  string tool_name = 4;
  // Claude Code の tool_input をそのまま JSON 文字列として保持
  string tool_input = 5;

  // session-start / session-end のみ。Claude Code の resume 起動に必要。
  string session_id = 7;

  // "done" (Stop) のみ。Stop 発火時に background_tasks / session_crons のいずれかが
  // 残っているか。CLI が stdin の 2 配列を OR で畳んで立てる。true のときは主エージェントの
  // ターンは終わったが裏で作業が継続中（= 再起動する）ため、真の done ではない。
  // フィールド名に has_ を付けると swift-protobuf が presence accessor と衝突して
  // `_p` suffix に mangle するため、pending_work とする。
  bool pending_work = 8;

  // session-start のみ。"startup" / "resume" / "clear" / "compact" 等
  string source = 9;
}

// `gozd open <path>` から送られるプロジェクトを開けの指示。
message OpenMessage {
  string target_path = 1;
}

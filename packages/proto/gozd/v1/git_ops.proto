syntax = "proto3";

package gozd.v1;

import "gozd/v1/common.proto";

// gitWorktreeList: worktree 一覧
message GitWorktreeListRequest {
  string dir = 1;
}
message GitWorktreeListResponse {
  repeated WorktreeEntry worktrees = 1;
}

// gitLog: HEAD と default branch（origin/HEAD の指す先）の log を返し、
// renderer 側で merge する設計。default_branch は git log で決まらないので
// `git symbolic-ref refs/remotes/origin/HEAD` から server 側で求める。
message GitLogRequest {
  string dir = 1;
  uint32 max_count = 2;
  bool first_parent_only = 3;
}
message GitLogResponse {
  repeated GitCommit head_commits = 1;
  repeated GitCommit default_branch_commits = 2;
  string default_branch = 3;
}

// gitDiffHunks: 2 つのテキスト間の hunk 単位差分を計算する。
//
// renderer 側で jsdiff の `diffLines()` を全文に対して回すと、`pnpm-lock.yaml` のような
// 数万行ファイルで Myers LCS が O(N×M) で爆発しメインスレッドが固まる。git の最適化された
// diff エンジン（xdiff、C 実装）に SSOT を移して計算コストを切り離す。
//
// Swift 側は受け取った original / current を tmp に書き出し `git diff --no-index --no-color`
// を実行、unified diff 出力を Hunk[] に parse して返す。renderer は hunk を順次描画し、
// hunk 間の skipped context 行は静的バーで表示する（click 展開・split view は別 issue）。
message GitDiffHunksRequest {
  string original = 1;
  string current = 2;
}

enum DiffLineKind {
  DIFF_LINE_KIND_CONTEXT = 0;
  DIFF_LINE_KIND_ADDED = 1;
  DIFF_LINE_KIND_REMOVED = 2;
}

message DiffHunkLine {
  DiffLineKind kind = 1;
  string text = 2;
}

// 1 hunk の範囲 + 各 line。start / lines は unified diff の `@@ -oldStart,oldLines +newStart,newLines @@`
// と同じ意味で 1-based。oldLines / newLines は context + 該当 side の add/remove の合計行数。
message DiffHunk {
  uint32 old_start = 1;
  uint32 old_lines = 2;
  uint32 new_start = 3;
  uint32 new_lines = 4;
  repeated DiffHunkLine lines = 5;
}

message GitDiffHunksResponse {
  repeated DiffHunk hunks = 1;
}

// gitShowFile: HEAD のファイル内容
message GitShowFileRequest {
  string dir = 1;
  string rel_path = 2;
}
message GitShowFileResponse {
  FileReadResult result = 1;
}

// gitShowCommitFile: 指定コミット（または 2 コミット間）のファイル内容
message GitShowCommitFileRequest {
  string dir = 1;
  string rel_path = 2;
  string hash = 3;
  string compare_hash = 4;
}
message GitShowCommitFileResponse {
  FileReadResult from = 1;
  FileReadResult to = 2;
  // from と to の指す blob OID が一致しているか。
  // Filer 経由でコミット範囲外（差分のない）ファイルを選んだ場合の
  // 「Diff タブを出さない」判定の SSOT。renderer 側 content 比較は使わない。
  // true になるのは「from と to の OID が両方解決でき、かつ一致」したときのみ。
  // どちらかが解決失敗（root の `^` / 未追跡 path / repo 破損）した場合は false。
  // 既存の `from.not_found` / `to.not_found` を優先評価する規約は変えない。
  bool unchanged = 3;
}

// gitCommitFiles: コミット（または範囲指定）の変更ファイル一覧
//
// 単一 commit 選択時は hash のみを使う。range_hashes が非空なら range mode で、
// renderer が git-graph の first-parent walk で組み立てた commit hash 列を渡す。Swift 側は
// 配列の先頭（newer）と末尾（older）の 2 endpoint で `git diff <older>^ <newer>` を実行する。
message GitCommitFilesRequest {
  string dir = 1;
  string hash = 2;
  string compare_hash = 3;
  // 範囲選択時の対象 commit 列。renderer が newer から first-parent walk で組み立てる。
  // 配列は newer (上端) から older (下端) の順で、両端を含む閉区間。
  // 非空なら hash / compare_hash は無視され、先頭と末尾の 2 endpoint diff が返る。
  repeated string range_hashes = 4;
  // 範囲選択の片端が Working Tree（UNCOMMITTED_HASH）の場合 true。
  // Swift 側で `git diff <older>^` (第二引数省略 = working tree 比較) に切り替える。
  bool include_working_tree = 5;
}
message GitCommitFilesResponse {
  repeated GitFileChange changes = 1;
}

// gh 経路の失敗種別。`ok=false` のとき renderer 側で文言を区別するために使う。
// `OK` は ok=true 時のデフォルト値で、`ok=false` 時にこのフィールドが OK のまま来ることは
// ない（必ず以下のいずれかに分類される）。
enum GhErrorKind {
  GH_ERROR_KIND_OK = 0;
  // rate limit 枯渇。stderr に "rate limit" / "API rate limit exceeded" 等を含む
  GH_ERROR_KIND_RATE_LIMIT = 1;
  // 未認証 / トークン無効。stderr に "authentication required" / "not authenticated" 等
  GH_ERROR_KIND_UNAUTHENTICATED = 2;
  // repo 不在 / アクセス権なし。stderr に "Not Found" / "Could not resolve to a Repository" 等
  GH_ERROR_KIND_REPO_NOT_FOUND = 3;
  // network / DNS / 接続失敗
  GH_ERROR_KIND_NETWORK = 4;
  // 上記いずれにも該当しない gh の non-zero exit
  GH_ERROR_KIND_OTHER = 5;
}

// gitPrList: gh pr list
message GitPrListRequest {
  string dir = 1;
}
message GitPrListResponse {
  // ok=false は gh CLI 未認証 / rate limit / repo 不在 等で取得不能を示す
  bool ok = 1;
  repeated GitPullRequest prs = 2;
  GhErrorKind error_kind = 3;
  // 表示しないが debug 用に stderr の冒頭を載せる（最大 512B 程度に切り詰める想定）
  string error_detail = 4;
}

// gitIssueList: gh issue list
message GitIssueListRequest {
  string dir = 1;
}
message GitIssueListResponse {
  bool ok = 1;
  repeated GitIssue issues = 2;
  GhErrorKind error_kind = 3;
  string error_detail = 4;
}

// gitViewer: 認証中の GitHub viewer login
message GitViewerRequest {
  string dir = 1;
}
message GitViewerResponse {
  bool ok = 1;
  string login = 2;
  GhErrorKind error_kind = 3;
  string error_detail = 4;
}

// gitDefaultBranch: `git worktree add -b <new> <abs> <ref>` の `<ref>` にそのまま渡せる
// 「default branch ref」を返す。新規 worktree 作成時の起点を一意に決めるために使う。
// 解決順序は二段 fallback:
//   1) `git symbolic-ref --short refs/remotes/origin/HEAD` で `origin/main` 等を返す（push 済み repo）
//   2) 失敗したら `git symbolic-ref --short HEAD` で `main` 等を返す（remote 未設定 / push 前 repo）
//   3) どちらも失敗（detached HEAD / unborn branch）なら空文字列を返し、呼び出し側が通知 + 中止する
message GitDefaultBranchRequest {
  string dir = 1;
}
message GitDefaultBranchResponse {
  string branch = 1;
}

// branchList: local ブランチ一覧。issue-picker が決定的 branch 名 (`issue-<N>`)
// の衝突検出に使う (worktree を持たない孤立 branch を含めて検証する必要があるため、
// GitWorktreeList では足りない)。
message GitBranchListRequest {
  string dir = 1;
}
message GitBranchListResponse {
  repeated string branches = 1;
}

// createWorktree: 新規 worktree を作成
message CreateWorktreeRequest {
  string dir = 1;
  string worktree_dir = 2;
  string branch = 3;
  string start_point = 4;
}
message CreateWorktreeResponse {
  WorktreeEntry worktree = 1;
  string dir = 2;
}

// gitWorktreeRemove: worktree を削除
message GitWorktreeRemoveRequest {
  string dir = 1;
  string path = 2;
  bool force = 3;
}
message GitWorktreeRemoveResponse {}

